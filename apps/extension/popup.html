<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">Y</div>
        <span class="logo-text">YuktiHire</span>
      </div>
      <div id="auth-status" class="auth-badge"></div>
    </div>

    <!-- States -->
    <div id="loading-state" class="state">
      <div class="spinner"></div>
      <p>Detecting job...</p>
    </div>

    <div id="login-state" class="state hidden">
      <p class="msg">Sign in to save jobs</p>
      <button id="login-btn" class="btn btn-primary">Sign in to YuktiHire</button>
    </div>

    <div id="no-job-state" class="state hidden">
      <p class="msg">No job detected on this page</p>
      <p class="sub">Try opening a job listing on LinkedIn, Greenhouse, Lever, or any career page.</p>
      <button id="manual-save-btn" class="btn btn-outline">Save page manually</button>
    </div>

    <div id="job-detected-state" class="state hidden">
      <div class="job-card">
        <div class="job-header">
          <div class="job-logo" id="job-logo">?</div>
          <div>
            <p class="job-title" id="job-title"></p>
            <p class="job-company" id="job-company"></p>
          </div>
        </div>
        <div class="job-meta">
          <span class="meta-tag" id="job-location"></span>
          <span class="meta-tag source" id="job-source"></span>
        </div>
        <div id="job-match" class="match-badge hidden"></div>
      </div>
      <div class="actions">
        <button id="save-btn" class="btn btn-primary">Save to Tracker</button>
        <button id="apply-btn" class="btn btn-outline">Mark Applied</button>
      </div>
      <div class="secondary-actions">
        <a id="dashboard-link" class="link" target="_blank">Open Dashboard</a>
        <a id="tailor-link" class="link" target="_blank">Tailor Resume</a>
      </div>
    </div>

    <div id="already-saved-state" class="state hidden">
      <div class="saved-badge">&#10003; Already Tracked</div>
      <div class="job-card">
        <p class="job-title" id="saved-title"></p>
        <p class="job-company" id="saved-company"></p>
        <p class="job-stage" id="saved-stage"></p>
      </div>
      <div class="actions">
        <a id="saved-dashboard-link" class="btn btn-outline" target="_blank">View in Dashboard</a>
        <a id="saved-tailor-link" class="btn btn-outline" target="_blank">Tailor Resume</a>
      </div>
    </div>

    <div id="success-state" class="state hidden">
      <div class="success-icon">&#10003;</div>
      <p class="msg">Job saved!</p>
      <a id="success-link" class="btn btn-primary" target="_blank">Open in Dashboard</a>
    </div>

    <div id="error-state" class="state hidden">
      <p class="msg error">Something went wrong</p>
      <p class="sub" id="error-msg"></p>
      <button id="retry-btn" class="btn btn-outline">Try again</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
