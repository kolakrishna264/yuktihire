<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">Y</div>
        <span class="logo-text">YuktiHire</span>
      </div>
      <div id="auth-status" class="auth-badge"></div>
    </div>

    <div id="loading-state" class="state">
      <div class="spinner"></div>
      <p>Analyzing page...</p>
    </div>

    <div id="login-state" class="state hidden">
      <p class="msg">Sign in to save jobs</p>
      <button id="login-btn" class="btn btn-primary">Sign in to YuktiHire</button>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f3f4f6">
        <p style="font-size:10px;color:#9ca3af;margin-bottom:6px">Or paste access token:</p>
        <input id="token-input" class="form-input" placeholder="Paste token" style="font-size:11px" />
        <button id="token-save-btn" class="btn btn-outline" style="margin-top:4px;font-size:11px;padding:6px">Connect</button>
      </div>
    </div>

    <!-- Main Panel — ALWAYS visible when authenticated -->
    <div id="main-panel" class="state hidden">
      <!-- Job info -->
      <div id="job-info" class="job-card hidden">
        <div class="job-header">
          <div class="job-logo" id="job-logo">?</div>
          <div style="flex:1;min-width:0">
            <p class="job-title" id="job-title"></p>
            <p class="job-company" id="job-company"></p>
          </div>
        </div>
        <div class="job-meta">
          <span class="meta-tag" id="job-location"></span>
          <span class="meta-tag source" id="job-source"></span>
        </div>
      </div>

      <div id="saved-badge-area" class="hidden" style="margin-bottom:8px">
        <div class="saved-badge">✓ Already Saved</div>
      </div>

      <!-- ALL actions always visible -->
      <div class="action-grid">
        <button id="save-btn" class="action-btn"><span class="action-icon">💾</span><span>Save Job</span></button>
        <button id="autofill-btn" class="action-btn"><span class="action-icon">⚡</span><span>Fill Form</span></button>
        <button id="tailor-btn" class="action-btn"><span class="action-icon">✨</span><span>Tailor</span></button>
        <button id="dashboard-btn" class="action-btn"><span class="action-icon">📊</span><span>Dashboard</span></button>
      </div>

      <div id="status-msg" class="status-msg hidden"></div>

      <!-- Manual save -->
      <div id="manual-section" class="hidden" style="margin-top:8px">
        <input id="manual-title" class="form-input" placeholder="Job title" />
        <input id="manual-company" class="form-input" placeholder="Company" />
      </div>

      <!-- Copilot panel -->
      <div id="copilot-section" class="copilot-section hidden">
        <div class="copilot-tabs">
          <button class="copilot-tab active" data-tab="fields">Fields</button>
          <button class="copilot-tab" data-tab="logs">Logs</button>
        </div>
        <div id="copilot-fields" class="copilot-content">
          <div id="field-summary" class="field-summary"></div>
          <div id="field-list" class="field-list"></div>
        </div>
        <div id="copilot-logs" class="copilot-content hidden">
          <div id="fill-logs"></div>
        </div>
      </div>
    </div>

    <div id="success-state" class="state hidden">
      <div class="success-icon">✓</div>
      <p class="msg">Done!</p>
      <p class="sub" id="success-msg">Job saved to dashboard.</p>
      <a id="success-link" class="btn btn-primary" target="_blank">Open Dashboard</a>
      <button id="back-btn" class="btn btn-outline" style="margin-top:6px">Back</button>
    </div>

    <div id="error-state" class="state hidden">
      <p class="msg error">Something went wrong</p>
      <p class="sub" id="error-msg"></p>
      <button id="retry-btn" class="btn btn-outline">Try again</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
